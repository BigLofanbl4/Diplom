services:
  db:
    image: postgres:17
    container_name: diplom-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-diplom}
      POSTGRES_USER: ${POSTGRES_USER:-diplom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-diplom}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-diplom} -d ${POSTGRES_DB:-diplom}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
