<main class="login-page">
  <section class="login-shell">
    <aside class="login-intro">
      <p class="login-intro__eyebrow">Digital Classroom</p>
      <h1 class="login-intro__title">Добро пожаловать в учебную платформу</h1>
      <p class="login-intro__text">
        Войдите в аккаунт, чтобы управлять курсами, группами и расписанием.
      </p>
    </aside>

    <div id="component" class="login-panel">
      <div class="component__inner">
        <form class="login-form" data-login-form>
          <h2 class="login-form__title">Вход в систему</h2>

          <div class="form-group">
            <label class="form-label" for="username">Логин</label>
            <input class="form-input" type="text" name="username" id="username" placeholder="Введите логин" required>
          </div>

          <div class="form-group">
            <label class="form-label" for="password">Пароль</label>
            <input class="form-input" type="password" name="password" id="password" placeholder="Введите пароль" required>
          </div>

          <button class="btn btn-primary login-form__submit" type="submit">Войти</button>
        </form>
      </div>
    </div>
  </section>
</main>
