<section class="form-page">
  <header class="page-hero page-hero--compact">
    <div class="page-hero__main">
      <span class="page-hero__eyebrow">Курсы</span>
      <h1 class="page-hero__title">Паспорт курса</h1>
      <p class="page-hero__description">Создайте учебную программу или уточните ее описание перед наполнением модулями и уроками.</p>
    </div>
  </header>

  <form class="student-form">
    <div class="form-grid">
      <div class="form-group">
        <label for="title" class="form-label">Название курса</label>
        <input type="text" id="title" name="title" class="form-input" required>
        <span class="form-error">Название курса обязательно для заполнения</span>
      </div>

      <div class="form-group form-group--full-width">
        <label for="description" class="form-label">Описание курса</label>
        <textarea id="description" name="description" class="form-input"></textarea>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" data-action="submit">Сохранить</button>
      <button type="button" class="btn btn-secondary" data-action="cancel">Отмена</button>
    </div>
  </form>
</section>
