<form class="form lesson__form">
  <div class="form-grid">
    <div class="form-group">
      <label for="lesson-title" class="form-label">Название урока</label>
      <input class="form-input" type="text" id="lesson-title" name="title" placeholder="Введите название урока" required>
    </div>
    <div class="form-group">
      <label for="lesson-number" class="form-label">Номер урока</label>
      <input class="form-input" type="number" id="lesson-number" name="lesson_number" min="1" placeholder="Введите номер урока" required>
    </div>
    <div class="form-group form-group--full-width">
      <label for="lesson-description" class="form-label">Описание</label>
      <textarea id="lesson-description" name="description" class="form-input" placeholder="Введите описание урока"></textarea>
    </div>
    <div class="form-group form-group--full-width">
      <label for="lesson-homework" class="form-label">Домашнее задание</label>
      <textarea id="lesson-homework" name="homework_text" class="form-input" placeholder="Введите домашнее задание"></textarea>
    </div>
    <div class="form-group form-group--full-width" data-template-preview hidden>
      <div class="teacher-template-preview">
        <div class="teacher-template-preview__header">
          <strong class="teacher-template-preview__title">Материалы и тест из шаблона</strong>
          <span class="teacher-template-preview__badge" data-template-test-badge hidden>Тест будет прикреплен</span>
        </div>
        <ul class="teacher-template-preview__list" data-template-materials-list></ul>
      </div>
    </div>
    <div class="form-group form-group--full-width">
      <label for="lesson-materials" class="form-label">Материалы</label>
      <div class="form-file-dropzone" data-drop-zone>
        <span class="form-file-dropzone-hint" data-hidden="false" data-drop-hint>Перетяните файлы или кликните на кнопку</span>
        <ul class="form-file-list" aria-live="polite" data-drop-file-list>
        </ul>
      </div>
      <label class="form-file-select-btn btn btn-primary" for="lesson-materials">
        Выберите файлы
      </label>
      <input class="form-file-input" id="lesson-materials" name="materials[]" type="file" multiple data-files-input>
    </div>
  </div>
  <div class="form-actions">
    <button type="submit" class="btn btn-primary" data-action="submit">Сохранить</button>
    <button type="button" class="btn btn-secondary" data-action="cancel">Отмена</button>
  </div>
</form>
