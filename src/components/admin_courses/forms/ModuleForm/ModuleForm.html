<form class="form modules__form">
  <div class="form-grid">
    <div class="form-group">
      <label for="module-title" class="form-label">Название модуля</label>
      <input class="form-input" type="text" id="module-title" name="title" required>
    </div>
    <div class="form-group">
      <label for="module-number" class="form-label">Номер модуля</label>
      <input class="form-input" type="number" id="module-number" name="module_number" min="1" required>
    </div>
  </div>
  <div class="form-actions">
    <button type="submit" class="btn btn-primary" data-action="submit">Сохранить</button>
    <button type="button" class="btn btn-secondary" data-action="cancel">Отмена</button>
  </div>
</form>
