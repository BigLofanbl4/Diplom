<form class="form modules__form">
  <div class="form-grid">
    <div class="form-group">
      <label for="lesson-title">Название:</label>
      <input class="form-input" type="text" id="lesson-title" name="title" required>
    </div>
    <div class="form-group">
      <label for="lesson-number">Номер урока:</label>
      <input class="form-input" type="number" id="lesson-number" name="lesson_number" min="1" required>
    </div>
    <div class="form-group">
      <label for="lesson-description">Описание:</label>
      <textarea id="lesson-description" name="description" class="form-input"></textarea>
    </div>
  </div>
  <div class="form-actions">
    <button type="submit" class="btn btn-primary" data-action="submit">Сохранить</button>
    <button type="button" class="btn btn-secondary" data-action="cancel">Отмена</button>
  </div>
</form>
