<form class="student-form">
  <div class="form-grid">
    <div class="form-group">
      <label for="group_number" class="form-label">Номер группы</label>
      <input type="number" id="group_number" name="group_number" class="form-input" min="1" required>
      <span class="form-error">Номер группы обязателен для заполенения</span>
    </div>
    
    <div class="form-group">
      <div data-select="student_ids"></div>
    </div>

    <div class="form-group">
      <div data-select="course_id"></div>
    </div>
  </div>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary" data-action="submit">Сохранить</button>
    <button type="button" class="btn btn-secondary" data-action="cancel">Отмена</button>
  </div>
</form>
