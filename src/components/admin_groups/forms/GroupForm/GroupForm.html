<section class="form-page">
  <header class="page-hero page-hero--compact">
    <div class="page-hero__main">
      <span class="page-hero__eyebrow">Группы</span>
      <h1 class="page-hero__title">Настройка учебной группы</h1>
      <p class="page-hero__description">Укажите номер группы, набор студентов и курс, к которому она относится.</p>
    </div>
  </header>

  <form class="student-form">
    <div class="form-grid">
      <div class="form-group">
        <label for="group_number" class="form-label">Номер группы</label>
        <input type="text" id="group_number" name="group_number" class="form-input" min="1" required>
        <span class="form-error">Номер группы обязателен для заполенения</span>
      </div>

      <div class="form-group form-group--full-width">
        <div data-select="student_ids"></div>
      </div>

      <div class="form-group form-group--full-width">
        <div data-select="course_id"></div>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" data-action="submit">Сохранить</button>
      <button type="button" class="btn btn-secondary" data-action="cancel">Отмена</button>
    </div>
  </form>
</section>
