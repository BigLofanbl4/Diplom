<section class="page-shell">
  <header class="page-hero">
    <div class="page-hero__main">
      <span class="page-hero__eyebrow">Группы</span>
      <h1 class="page-hero__title">Организация учебных групп</h1>
      <p class="page-hero__description">
        Объединяйте студентов, закрепляйте курсы и контролируйте назначение преподавателей по каждой группе.
      </p>
    </div>
    <div class="page-hero__actions">
      <a href="/admin/groups/create" class="createBtn" data-spa-link>Создать группу</a>
    </div>
  </header>

  <section class="table-panel">
    <div class="table__controls">
      <p class="table__controls-note">В этом разделе собраны все группы с их составом, курсом и текущим преподавателем.</p>

      <thead class="table__head">
        <tr class="table__row">
          <th class="table__col table__id-col">ID</th>
          <th class="table__col table__small-col">Номер группы</th>
          <th class="table__col table__large-col">Студенты</th>
          <th class="table__col table__small-col">Преподаватель</th>
          <th class="table__col table__small-col">Действия</th>
        </tr>
      </thead>
      <tbody class="table__body"></tbody>
    </table>
  </section>
</section>
