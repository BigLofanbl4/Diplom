<div class="assign-teacher-page" data-component-root>
    <div class="assign-teacher-page__topbar">
        <a href="/admin/groups" class="assign-teacher-page__back-link" data-spa-link data-back-link>
            Назад
        </a>
    </div>

    <section class="assign-teacher-hero">
        <div class="assign-teacher-hero__content">
            <span class="assign-teacher-hero__eyebrow">Назначение преподавателя</span>
            <div class="assign-teacher-group-card" data-group-info>
                <div class="assign-teacher-group-card__main">
                    <span class="assign-teacher-group-card__label" data-group-number-label></span>
                    <h2 class="assign-teacher-group-card__title" data-group-title></h2>
                    <div class="assign-teacher-group-card__meta">
                        <div class="assign-teacher-stat">
                            <span class="assign-teacher-stat__label">Курс</span>
                            <strong class="assign-teacher-stat__value" data-course-title></strong>
                        </div>
                        <div class="assign-teacher-stat">
                            <span class="assign-teacher-stat__label">Студентов</span>
                            <strong class="assign-teacher-stat__value" data-students-count></strong>
                        </div>
                        <div class="assign-teacher-stat">
                            <span class="assign-teacher-stat__label">Текущий преподаватель</span>
                            <strong class="assign-teacher-stat__value" data-hero-teacher></strong>
                        </div>
                    </div>
                </div>

                <div class="assign-teacher-group-card__side">
                    <span class="assign-teacher-group-card__side-label">Состав группы</span>
                    <p class="assign-teacher-group-card__side-text" data-students-preview></p>
                </div>
            </div>
        </div>
    </section>

    <section class="assign-teacher-panel assign-teacher-panel--teacher">
        <div class="assign-teacher-panel__header">
            <h3 class="assign-teacher-panel__title">Текущий преподаватель</h3>
        </div>
        <div class="assign-teacher-current">
            <div class="assign-teacher-current__main">
                <p class="assign-teacher-current__name" data-current-teacher></p>
                <span class="assign-teacher-current__label">Назначенный преподаватель</span>
            </div>
            <button class="btn btn-danger assign-teacher-current__action" data-action="removeTeacher">Снять преподавателя</button>
        </div>
    </section>

    <section class="assign-teacher-panel assign-teacher-panel--criteria">
        <div class="assign-teacher-panel__header">
            <h3 class="assign-teacher-panel__title">Расписание группы для подбора</h3>
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label class="form-label" for="planned_start_date">Дата старта группы</label>
                <input class="form-input" id="planned_start_date" type="date" data-group-start-date>
            </div>

            <div class="form-group">
                <label class="form-label" for="planned_end_date">Дата окончания</label>
                <input class="form-input" id="planned_end_date" type="date" data-group-end-date>
            </div>
        </div>

        <div class="assign-teacher-slots">
            <div class="assign-teacher-slots__header">
                <strong>Weekly-слоты группы</strong>
                <button class="btn btn-secondary" type="button" data-action="addSlot">Добавить слот</button>
            </div>
            <div data-schedule-slots></div>
        </div>

        <div class="assign-teacher-panel__actions">
            <button class="btn btn-primary" type="button" data-action="applySchedule">Обновить доступность</button>
        </div>
    </section>

    <section class="assign-teacher-panel assign-teacher-panel--list">
        <div class="assign-teacher-panel__header">
            <h3 class="assign-teacher-panel__title">Доступные преподаватели</h3>
        </div>

        <label class="assign-teacher-filter">
            <span class="assign-teacher-filter__label">Поиск преподавателя</span>
            <input
                type="text"
                class="form-input assign-teacher-filter__input"
                placeholder="Введите ФИО учителя"
                data-teacher-filter
            >
        </label>

        <div class="assign-teacher-list-surface">
            <div class="assign-teacher-list-surface__accent"></div>
            <div class="assign-teacher-table-wrap">
                <table class="table assign-teacher-table">
                    <thead class="table__head">
                        <tr class="table__row">
                            <th class="table__col table__id-col">ID</th>
                            <th class="table__col table__medium-col">ФИО</th>
                            <th class="table__col table__medium-col">Статус</th>
                            <th class="table__col table__medium-col">Комментарий</th>
                            <th class="table__col table__small-col">Действия</th>
                        </tr>
                    </thead>
                    <tbody class="table__tbody" data-teachers-table></tbody>
                </table>
            </div>
        </div>

        <button class="btn btn-primary" data-action="loadMore">Загрузить еще</button>
    </section>
</div>
